name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    name: Unit + Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - name: Tests backend
        run: |
          SESSION_SECRET="ci-test-secret-al-menos-32-caracteres" \
          pnpm vitest run
        working-directory: backend
      - name: Tests frontend
        run: pnpm vitest run
        working-directory: frontend

  e2e-chromium:
    name: E2E Chromium
    runs-on: ubuntu-latest
    needs: unit-and-integration
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Instalar Playwright
        run: pnpm exec playwright install --with-deps chromium
        working-directory: frontend
      - name: Compilar backend
        run: pnpm build
        working-directory: backend
      - name: Compilar frontend
        run: pnpm build
        working-directory: frontend
      - name: Arrancar backend con TEST_AUTH
        run: |
          SESSION_SECRET="ci-e2e-secret-al-menos-32-caracteres!!" \
          TEST_AUTH=on \
          NODE_ENV=test \
          PORT=18081 \
          node dist/server.js &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
        working-directory: backend
      - name: Esperar healthz
        run: |
          for i in $(seq 1 20); do
            curl -fs http://localhost:18081/healthz && break || sleep 1
          done
      - name: Correr e2e Chromium
        run: pnpm e2e:chromium
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:18081
          CI: true
      - name: Subir informe Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Subir resultados en caso de fallo
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7
